<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Component Hunt: Product Card</title>
    <style>
        /* 1. Global Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. The Component Container */
        .product-card {
            background-color: white;
            width: 280px;
            border-radius: 10px;
            overflow: hidden; /* Keeps image corners rounded */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
            padding-bottom: 20px;
        }

        /* Hover Effect: Makes the component feel interactive */
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        /* 3. Sub-Components */
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #333;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .buy-btn:hover {
            background-color: #e67e22;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="Product" class="product-image">
        <div class="product-info">
            <h3 class="product-title">Premium Watch</h3>
            <p class="product-price">$199.99</p>
            <button class="buy-btn">Add to Cart</button>
        </div>
    </div>

</body>
</html>
